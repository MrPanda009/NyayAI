version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: nyaya_postgres
    environment:
      POSTGRES_USER: nyaya
      POSTGRES_PASSWORD: nyaya123
      POSTGRES_DB: nyayaai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: nyaya_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  qdrant:
    image: qdrant/qdrant:latest
    container_name: nyaya_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  neo4j:
    image: neo4j:5.20
    container_name: nyaya_neo4j
    environment:
      NEO4J_AUTH: neo4j/nyaya123
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474"   # Browser UI
      - "7687:7687"   # Bolt
    volumes:
      - neo4j_data:/data

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  neo4j_data:
